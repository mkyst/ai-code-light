server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: ai-code-platform
  datasource:
    url: jdbc:mysql://localhost:3306/ai_code?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
  jackson:
    time-zone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss

# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# JWT
jwt:
  secret: ${JWT_SECRET:aicode_default_jwt_secret_key_needs_to_be_long_enough_for_hs256}
  expiration: 86400000  # 24 hours

# LangChain4j - Qwen via OpenAI-compatible API
langchain4j:
  open-ai:
    chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${QWEN_API_KEY:sk-cf7e227908274a9c9c163abce802a3c4}
      model-name: qwen-plus
      temperature: 0.7
      max-tokens: 8192
      timeout: PT300S
      log-requests: true
      log-responses: true
    streaming-chat-model:
      base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
      api-key: ${QWEN_API_KEY:sk-cf7e227908274a9c9c163abce802a3c4}
      model-name: qwen-plus
      temperature: 0.7
      max-tokens: 8192
      timeout: PT300S
      log-requests: true
      log-responses: true

# Knife4j API Docs
knife4j:
  enable: true
  openapi:
    title: AI代码生成平台 API
    description: Enterprise AI Code Generation Platform
    version: 1.0.0

# File Storage
storage:
  local:
    path: ./uploads

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.aicode: DEBUG
    dev.langchain4j: DEBUG
